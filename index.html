<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netquel Fleet Command</title>
    <!-- Local scripts for offline stability -->
    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>
    <script src="babel.min.js"></script>
    <!-- Tailwind via Play CDN (Fast and sleek styling) -->
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURATION: Replace with your GitHub info for community features
        const GITHUB_CONFIG = {
            owner: "YOUR_GITHUB_USERNAME",
            repo: "netquel-manager",
            path: "community-ships"
        };

        function App() {
            const [view, setView] = useState("local");
            const [ships, setShips] = useState([]);
            const [communityShips, setCommunityShips] = useState([]);
            const [selectedShip, setSelectedShip] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [search, setSearch] = useState("");
            const [formData, setFormData] = useState({ name: "", size: "", encoded: "", img: "" });

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('netquel_fleet') || '[]');
                setShips(saved);
                window.addEventListener('online', () => setIsOnline(true));
                window.addEventListener('offline', () => setIsOnline(false));
                if (navigator.onLine) fetchCommunity();
            }, []);

            const fetchCommunity = async () => {
                try {
                    const res = await fetch(`https://github.com{GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`);
                    if (!res.ok) throw new Error();
                    const files = await res.json();
                    const data = await Promise.all(
                        files.filter(f => f.name.endsWith('.json')).map(f => fetch(f.download_url).then(r => r.json()))
                    );
                    setCommunityShips(data);
                } catch (e) { console.warn("Community fetch failed. Repo might be private or folder empty."); }
            };

            const saveLocal = () => {
                if (!formData.name || !formData.encoded) return alert("Missing ship data!");
                const newShip = { ...formData, id: Date.now(), created: new Date().toLocaleDateString() };
                const updated = [...ships, newShip];
                setShips(updated);
                localStorage.setItem('netquel_fleet', JSON.stringify(updated));
                setFormData({ name: "", size: "", encoded: "", img: "" });
                alert("Ship registered to local hanger!");
            };

            const deleteShip = (id) => {
                const updated = ships.filter(s => s.id !== id);
                setShips(updated);
                localStorage.setItem('netquel_fleet', JSON.stringify(updated));
                setSelectedShip(null);
            };

            const handleImg = (e) => {
                const reader = new FileReader();
                reader.onloadend = () => setFormData({...formData, img: reader.result});
                reader.readAsDataURL(e.target.files[0]);
            };

            const filteredShips = (view === "local" ? ships : communityShips)
                .filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="flex h-screen w-full overflow-hidden bg-slate-950">
                    {/* SIDEBAR */}
                    <div className="w-80 glass border-r border-white/5 flex flex-col p-6">
                        <h1 className="text-xl font-black text-blue-500 mb-2">NETQUEL FLEET</h1>
                        <div className={`text-[10px] mb-6 inline-block px-2 py-0.5 rounded border self-start ${isOnline ? 'text-emerald-400 border-emerald-500/30' : 'text-rose-400 border-rose-500/30'}`}>
                            {isOnline ? "COMMUNITY CONNECTED" : "OFFLINE MODE"}
                        </div>

                        <div className="flex gap-2 mb-6">
                            <button onClick={() => setView("local")} className={`flex-1 py-2 text-[10px] font-bold rounded-lg transition ${view === "local" ? 'bg-blue-600' : 'bg-white/5 opacity-50'}`}>MY SHIPS</button>
                            <button onClick={() => {setView("community"); fetchCommunity();}} className={`flex-1 py-2 text-[10px] font-bold rounded-lg transition ${view === "community" ? 'bg-blue-600' : 'bg-white/5 opacity-50'}`}>COMMUNITY</button>
                        </div>

                        <input 
                            type="text" placeholder="Search registry..." 
                            className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-blue-500 transition"
                            onChange={(e) => setSearch(e.target.value)}
                        />

                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2">
                            {filteredShips.map(ship => (
                                <div key={ship.id || ship.name} onClick={() => setSelectedShip(ship)} className={`p-4 rounded-xl cursor-pointer border ${selectedShip?.name === ship.name ? 'bg-blue-500/20 border-blue-500' : 'bg-white/5 border-transparent'}`}>
                                    <div className="font-bold text-sm uppercase tracking-wide">{ship.name}</div>
                                    <div className="text-[10px] text-slate-500 font-mono italic">{ship.size}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MAIN PANEL */}
                    <div className="flex-1 overflow-y-auto p-10 custom-scrollbar">
                        {view === "local" && (
                            <div className="glass rounded-3xl p-8 mb-10 border border-white/10 shadow-2xl">
                                <h2 className="text-xs font-bold text-blue-400 uppercase tracking-[0.2em] mb-6 text-center">New Vessel Registration</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                    <input placeholder="Ship Name" className="bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})}/>
                                    <input placeholder="Size (e.g. 15x15)" className="bg-black/40 border border-white/10 rounded-xl p-3 text-sm outline-none" value={formData.size} onChange={e => setFormData({...formData, size: e.target.value})}/>
                                    <input type="file" className="text-xs pt-2" onChange={handleImg}/>
                                </div>
                                <textarea placeholder="Paste Encoded String (/save)" className="w-full bg-black/40 border border-white/10 rounded-xl p-3 h-24 text-xs font-mono mb-6 outline-none resize-none" value={formData.encoded} onChange={e => setFormData({...formData, encoded: e.target.value})}/>
                                <button onClick={saveLocal} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold text-sm transition">SAVE TO LOCAL STORAGE</button>
                            </div>
                        )}

                        {selectedShip ? (
                            <div className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                                <div className="flex justify-between items-end mb-8">
                                    <div>
                                        <h2 className="text-6xl font-black italic tracking-tighter uppercase leading-tight">{selectedShip.name}</h2>
                                        <p className="text-blue-500 font-mono uppercase tracking-widest text-xs">{selectedShip.size} CLASS | {selectedShip.created}</p>
                                    </div>
                                    <div className="flex gap-3">
                                        {view === "local" && (
                                            <button onClick={() => deleteShip(selectedShip.id)} className="bg-rose-500/10 text-rose-500 border border-rose-500/20 px-6 py-2 rounded-xl text-[10px] font-bold">SCRAP</button>
                                        )}
                                        <button onClick={() => {navigator.clipboard.writeText(selectedShip.encoded); alert('Blueprint copied!');}} className="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-bold uppercase">Copy Blueprint</button>
                                    </div>
                                </div>
                                {selectedShip.img && <img src={selectedShip.img} className="w-full h-[400px] object-cover rounded-[40px] border border-white/10 shadow-2xl mb-8" />}
                                <div className="p-6 bg-black/60 border border-white/5 rounded-2xl font-mono text-[9px] text-slate-500 break-all leading-relaxed">
                                    {selectedShip.encoded}
                                </div>
                            </div>
                        ) : (
                            <div className="h-full flex items-center justify-center opacity-20 border-2 border-dashed border-white/10 rounded-[40px]">
                                <p className="font-bold uppercase tracking-[0.3em] text-xs">System Awaiting Vessel Selection</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
