<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netquel Fleet Command</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { background-color: #020617; color: white; font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURATION: Replace these with your info!
        const GITHUB_CONFIG = {
            owner: "logangoogledev",
            repo: "Netquel_CustomShips_Server",
            path: "community-ships"
        };

        function App() {
            const [view, setView] = useState("local"); // 'local' or 'community'
            const [ships, setShips] = useState([]);
            const [communityShips, setCommunityShips] = useState([]);
            const [selectedShip, setSelectedShip] = useState(null);
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [search, setSearch] = useState("");

            // Form State
            const [formData, setFormData] = useState({ name: "", size: "", encoded: "", img: "" });

            useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('netquel_fleet') || '[]');
                setShips(saved);
                window.addEventListener('online', () => setIsOnline(true));
                window.addEventListener('offline', () => setIsOnline(false));
                if (isOnline) fetchCommunity();
            }, []);

            const fetchCommunity = async () => {
                try {
                    const res = await fetch(`https://github.com{GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`);
                    const files = await res.json();
                    const data = await Promise.all(
                        files.filter(f => f.name.endsWith('.json')).map(f => fetch(f.download_url).then(r => r.json()))
                    );
                    setCommunityShips(data);
                } catch (e) { console.error("Offline or Repo not found"); }
            };

            const saveLocal = () => {
                if (!formData.name || !formData.encoded) return alert("Missing ship data!");
                const newShip = { ...formData, id: Date.now(), created: new Date().toLocaleString() };
                const updated = [...ships, newShip];
                setShips(updated);
                localStorage.setItem('netquel_fleet', JSON.stringify(updated));
                setFormData({ name: "", size: "", encoded: "", img: "" });
                alert("Saved to local hanger!");
            };

            const deleteShip = (id) => {
                const updated = ships.filter(s => s.id !== id);
                setShips(updated);
                localStorage.setItem('netquel_fleet', JSON.stringify(updated));
                setSelectedShip(null);
            };

            const handleImg = (e) => {
                const reader = new FileReader();
                reader.onloadend = () => setFormData({...formData, img: reader.result});
                reader.readAsDataURL(e.target.files[0]);
            };

            const copyToClipboard = (str) => {
                navigator.clipboard.writeText(str);
                alert("Encoded string copied! Use /load in Netquel.");
            };

            const filteredShips = (view === "local" ? ships : communityShips)
                .filter(s => s.name.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="flex h-screen w-full overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">
                    
                    {/* SIDEBAR */}
                    <div className="w-80 glass border-r border-white/5 flex flex-col p-6">
                        <div className="mb-8">
                            <h1 className="text-xl font-black tracking-tighter text-blue-500">NETQUEL FLEET</h1>
                            <div className={`text-[10px] mt-1 inline-block px-2 py-0.5 rounded border ${isOnline ? 'text-emerald-400 border-emerald-500/30 bg-emerald-500/10' : 'text-rose-400 border-rose-500/30 bg-rose-500/10'}`}>
                                {isOnline ? "COMMUNITY CONNECTED" : "OFFLINE MODE"}
                            </div>
                        </div>

                        <div className="flex gap-2 mb-6">
                            <button onClick={() => setView("local")} className={`flex-1 py-2 text-xs font-bold rounded-lg transition ${view === "local" ? 'bg-blue-600 text-white' : 'bg-white/5 text-slate-400'}`}>MY SHIPS</button>
                            <button onClick={() => {setView("community"); fetchCommunity();}} className={`flex-1 py-2 text-xs font-bold rounded-lg transition ${view === "community" ? 'bg-blue-600 text-white' : 'bg-white/5 text-slate-400'}`}>COMMUNITY</button>
                        </div>

                        <input 
                            type="text" placeholder="Search registry..." 
                            className="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none focus:border-blue-500 transition"
                            onChange={(e) => setSearch(e.target.value)}
                        />

                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-2">
                            {filteredShips.map(ship => (
                                <div 
                                    key={ship.id || ship.name}
                                    onClick={() => setSelectedShip(ship)}
                                    className={`p-4 rounded-xl cursor-pointer transition border ${selectedShip?.name === ship.name ? 'bg-blue-500/20 border-blue-500' : 'bg-white/5 border-transparent hover:bg-white/10'}`}
                                >
                                    <div className="font-bold text-sm uppercase tracking-wide">{ship.name}</div>
                                    <div className="text-[10px] text-slate-500 font-mono">{ship.size} | {ship.created?.split(',')[0]}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MAIN PANEL */}
                    <div className="flex-1 overflow-y-auto p-10 custom-scrollbar">
                        {/* Entry Form */}
                        {view === "local" && (
                            <div className="glass rounded-3xl p-8 mb-10 border border-white/10">
                                <h2 className="text-sm font-bold text-blue-400 uppercase tracking-widest mb-6">Register New Vessel</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-slate-400 uppercase font-bold">Vessel Name</label>
                                        <input className="w-full bg-black/40 border border-white/10 rounded-xl p-3 outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})}/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-slate-400 uppercase font-bold">Class / Size</label>
                                        <input className="w-full bg-black/40 border border-white/10 rounded-xl p-3 outline-none" placeholder="e.g. 25x25" value={formData.size} onChange={e => setFormData({...formData, size: e.target.value})}/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] text-slate-400 uppercase font-bold">Blueprint Image</label>
                                        <input type="file" className="w-full text-xs text-slate-500 pt-2" onChange={handleImg}/>
                                    </div>
                                </div>
                                <div className="space-y-2 mb-6">
                                    <label className="text-[10px] text-slate-400 uppercase font-bold">Encoded String (/save)</label>
                                    <textarea className="w-full bg-black/40 border border-white/10 rounded-xl p-3 h-24 outline-none resize-none font-mono text-xs" value={formData.encoded} onChange={e => setFormData({...formData, encoded: e.target.value})}/>
                                </div>
                                <button onClick={saveLocal} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold text-sm transition shadow-lg shadow-blue-500/20">COMMIT TO LOCAL HANGER</button>
                            </div>
                        )}

                        {/* Detail View */}
                        {selectedShip ? (
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <div className="flex justify-between items-end mb-8">
                                    <div>
                                        <h2 className="text-6xl font-black italic tracking-tighter uppercase leading-none">{selectedShip.name}</h2>
                                        <p className="text-blue-500 font-mono mt-2 uppercase tracking-widest text-sm">{selectedShip.size} CLASS — REGISTERED {selectedShip.created}</p>
                                    </div>
                                    <div className="flex gap-3">
                                        {view === "local" && (
                                            <button onClick={() => deleteShip(selectedShip.id)} className="bg-rose-500/10 text-rose-500 border border-rose-500/20 px-6 py-2 rounded-xl text-xs font-bold hover:bg-rose-500 hover:text-white transition">SCRAP VESSEL</button>
                                        )}
                                        <button onClick={() => copyToClipboard(selectedShip.encoded)} className="bg-white text-black px-6 py-2 rounded-xl text-xs font-bold hover:bg-blue-400 hover:text-white transition">COPY BLUEPRINT</button>
                                    </div>
                                </div>

                                {selectedShip.img && (
                                    <img src={selectedShip.img} className="w-full h-[400px] object-cover rounded-3xl border border-white/10 shadow-2xl mb-8" />
                                )}

                                <div className="p-6 bg-black/60 border border-white/5 rounded-2xl font-mono text-[10px] text-slate-400 break-all leading-relaxed">
                                    {selectedShip.encoded}
                                </div>
                            </div>
                        ) : (
                            <div className="h-96 flex flex-col items-center justify-center border-2 border-dashed border-white/5 rounded-[40px] text-slate-600">
                                <div className="text-4xl mb-4 opacity-20">🚀</div>
                                <p className="font-bold uppercase tracking-widest text-xs opacity-40">Awaiting Vessel Selection</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
