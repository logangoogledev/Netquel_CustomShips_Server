<!DOCTYPE html>
<html>
<head>
    <title>Netquel Community Hub</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; background: #0d1117; color: #c9d1d9; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; text-align: left; }
        img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #30363d; }
        button { background: #1f6feb; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Netquel Community Designs</h1>
    <div id="gallery" class="grid">Scanning the hangar...</div>

    <script>
        const USER = 'logangoogledev';
        const REPO = 'Netquel_CustomShips_Server';
        const FOLDER = 'community-ships';

        async function load() {
            const gallery = document.getElementById('gallery');
            try {
                // CORRECTED API FETCH
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                if (!res.ok) throw new Error();
                const files = await res.json();
                gallery.innerHTML = "";

                for (let f of files) {
                    if (f.name.endsWith('.json')) {
                        const data = await fetch(f.download_url).then(r => r.json());
                        gallery.innerHTML += `
                            <div class="card">
                                ${data.img ? `<img src="${data.img}">` : ''}
                                <h3>${data.name}</h3>
                                <button onclick="navigator.clipboard.writeText('${data.code}'); alert('Copied!');">Copy Code</button>
                            </div>`;
                    }
                }
            } catch (e) { gallery.innerHTML = "No ships found in the hangar yet."; }
        }
        load();
    </script>
</body>
</html>
