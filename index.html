<!DOCTYPE html>
<html>
<head>
    <title>Netquel Community Hub</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; background: #0f172a; color: #f8fafc; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Netquel Community Designs</h1>
    <p>Browse and copy custom ship strings below.</p>
    <div id="gallery" class="grid">Loading ships...</div>

    <script>
        const USER = 'logangoogledev';
        const REPO = 'Netquel_CustomShips_Server';
        const FOLDER = 'community-ships';

        async function load() {
            const gallery = document.getElementById('gallery');
            try {
                const res = await fetch(`https://github.com{USER}/${REPO}/contents/${FOLDER}`);
                const files = await res.json();
                gallery.innerHTML = "";

                for (let f of files) {
                    if (f.name.endsWith('.json')) {
                        const data = await fetch(f.download_url).then(r => r.json());
                        gallery.innerHTML += `
                            <div class="card">
                                ${data.img ? `<img src="${data.img}">` : ''}
                                <h3>${data.name}</h3>
                                <button onclick="copy('${data.code}')">Copy Ship Code</button>
                            </div>`;
                    }
                }
            } catch (e) { gallery.innerHTML = "No ships found yet!"; }
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            alert("Ship code copied to clipboard!");
        }
        load();
    </script>
</body>
</html>
