<!DOCTYPE html>
<html>
<head>
    <title>Netquel - Admin Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 20px auto; background: #0b0f19; color: white; }
        .card { background: #161b22; padding: 20px; margin: 15px 0; border-radius: 8px; border: 1px solid #30363d; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; }
        button { background: #238636; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #2ea043; }
        .delete { background: #da3633; width: auto; margin-right: 10px; }
        .publish { background: #1f6feb; width: auto; }
        img { max-width: 100%; border-radius: 4px; margin-top: 10px; border: 1px solid #30363d; }
    </style>
</head>
<body>
    <h1>Netquel Ship Vault</h1>
    <div class="card">
        <h3>Create New Ship Entry</h3>
        <input type="text" id="name" placeholder="Ship Name">
        <textarea id="code" placeholder="Paste Encoded String (/save)" rows="3"></textarea>
        <input type="file" id="img" accept="image/*">
        <button onclick="saveLocal()">Save to My Offline Vault</button>
    </div>
    <hr style="border: 0; border-top: 1px solid #30363d;">
    <div id="list"></div>

    <script>
        const USER = 'logangoogledev';
        const REPO = 'Netquel_CustomShips_Server';
        const FOLDER = 'community-ships';

        let db;
        const req = indexedDB.open("NetquelVault", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("ships", { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; render(); };

        function saveLocal() {
            const file = document.getElementById('img').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const tx = db.transaction("ships", "readwrite");
                tx.objectStore("ships").add({
                    name: document.getElementById('name').value,
                    code: document.getElementById('code').value,
                    img: e.target.result,
                    date: new Date().toLocaleString()
                });
                tx.oncomplete = () => { render(); document.getElementById('name').value = ''; document.getElementById('code').value = ''; };
            };
            if(file) reader.readAsDataURL(file); else reader.onload({target:{result:null}});
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = "";
            db.transaction("ships").objectStore("ships").openCursor(null, 'prev').onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    const s = cursor.value;
                    list.innerHTML += `<div class="card">
                        <small style="color:#8b949e">${s.date}</small>
                        <h4 style="margin:5px 0;">${s.name}</h4>
                        ${s.img ? `<img src="${s.img}">` : ''}
                        <p><button class="delete" onclick="del(${cursor.key})">Delete Offline</button>
                        <button class="publish" onclick="publish(${cursor.key})">Publish to Community</button></p>
                    </div>`;
                    cursor.continue();
                }
            };
        }

        function del(id) { if(confirm("Remove from offline vault?")) { db.transaction("ships","readwrite").objectStore("ships").delete(id).oncomplete = render; } }

        async function publish(id) {
            let token = localStorage.getItem('gh_token') || prompt("Enter GitHub Personal Access Token:");
            if(!token) return; localStorage.setItem('gh_token', token);
            
            db.transaction("ships").objectStore("ships").get(id).onsuccess = async e => {
                const s = e.target.result;
                const fileName = `${s.name.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}.json`;
                const res = await fetch(`https://github.com{USER}/${REPO}/contents/${FOLDER}/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: `Added ${s.name}`, content: btoa(JSON.stringify(s)) })
                });
                if(res.ok) alert("Published Successfully!"); else alert("Error. Check your token permissions.");
            };
        }
    </script>
</body>
</html>
