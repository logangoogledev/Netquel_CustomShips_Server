<!DOCTYPE html>
<html>
<head>
    <title>Netquel Admin Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; background: #0d1117; color: #c9d1d9; }
        .card { background: #161b22; padding: 20px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; }
        input, textarea, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #30363d; background: #010409; color: white; box-sizing: border-box; }
        button { background: #238636; cursor: pointer; border: none; font-weight: bold; }
        .delete { background: #da3633; width: auto; margin-right: 10px; }
        .publish { background: #1f6feb; width: auto; }
        img { max-width: 100%; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Netquel Ship Manager (Admin)</h1>
    <div class="card">
        <h3>Save New Ship Design</h3>
        <input type="text" id="name" placeholder="Ship Name">
        <textarea id="code" placeholder="Ship String" rows="3"></textarea>
        <input type="file" id="img" accept="image/*">
        <button onclick="saveLocal()">Save Locally</button>
    </div>
    <div id="list"></div>

    <script>
        const USER = 'logangoogledev';
        const REPO = 'Netquel_CustomShips_Server';
        const FOLDER = 'community-ships';

        let db;
        const req = indexedDB.open("NetquelVault", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("ships", { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; render(); };

        function saveLocal() {
            const file = document.getElementById('img').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const tx = db.transaction("ships", "readwrite");
                tx.objectStore("ships").add({
                    name: document.getElementById('name').value,
                    code: document.getElementById('code').value,
                    img: e.target.result,
                    date: new Date().toLocaleString()
                });
                tx.oncomplete = () => { render(); document.getElementById('name').value = ''; document.getElementById('code').value = ''; };
            };
            if(file) reader.readAsDataURL(file); else reader.onload({target:{result:null}});
        }

        function render() {
            const list = document.getElementById('list'); list.innerHTML = "";
            db.transaction("ships").objectStore("ships").openCursor(null, 'prev').onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    const s = cursor.value;
                    list.innerHTML += `<div class="card"><h4>${s.name}</h4>${s.img ? `<img src="${s.img}">` : ''}
                        <p><button class="delete" onclick="del(${cursor.key})">Delete</button>
                        <button class="publish" onclick="publish(${cursor.key})">Publish to GitHub</button></p></div>`;
                    cursor.continue();
                }
            };
        }

        function del(id) { if(confirm("Delete?")) db.transaction("ships","readwrite").objectStore("ships").delete(id).oncomplete = render; }

        async function publish(id) {
            let token = localStorage.getItem('gh_token') || prompt("Enter GitHub Token:");
            if(!token) return; 
            localStorage.setItem('gh_token', token);
            
            const store = db.transaction("ships").objectStore("ships");
            store.get(id).onsuccess = async e => {
                const s = e.target.result;
                // We use a safe name for the file
                const cleanName = s.name.replace(/[^a-z0-9]/gi, '_');
                const fileName = `${cleanName}_${Date.now()}.json`;
                
                // This is the EXACT URL the API needs
                const url = "https://github.com" + fileName;
        
                try {
                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: { 
                            'Authorization': 'token ' + token,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ 
                            message: "Shared ship: " + s.name, 
                            content: btoa(JSON.stringify(s)) 
                        })
                    });
        
                    if(res.ok) {
                        alert("Published Successfully!");
                    } else {
                        const errData = await res.json();
                        console.error(errData);
                        alert("Error: " + errData.message);
                    }
                } catch (err) {
                    console.error(err);
                    alert("Connection Failed. Make sure you are connected to the internet.");
                }
            };
        }

    </script>
</body>
</html>
